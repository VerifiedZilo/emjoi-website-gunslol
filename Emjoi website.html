<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holo Emoji UI</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: #05060a;
            font-family: 'Orbitron', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* GRID BACKGROUND */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 10s linear infinite;
        }

        @keyframes moveGrid {
            from {
                transform: perspective(500px) rotateX(60deg) translateY(0);
            }

            to {
                transform: perspective(500px) rotateX(60deg) translateY(50px);
            }
        }

        /* SCANLINES */
        .scanlines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient( to bottom, rgba(255,255,255,0.03), rgba(255,255,255,0.03) 1px, transparent 1px, transparent 3px );
            pointer-events: none;
        }

        /* MAIN CARD */
        .container {
            position: relative;
            padding: 50px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,255,255,0.3);
            box-shadow: 0 0 40px rgba(0,255,255,0.2);
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.2s ease;
        }

        /* EMOJI */
        .emoji {
            font-size: 6rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%,100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        /* TYPE TEXT */
        h1 {
            margin-top: 20px;
            font-size: 2rem;
            text-shadow: 0 0 10px cyan, 0 0 30px purple;
        }

        /* GLITCH */
        .glitch {
            position: relative;
        }

            .glitch::before,
            .glitch::after {
                content: attr(data-text);
                position: absolute;
                left: 0;
            }

            .glitch::before {
                color: cyan;
                animation: glitchTop 1s infinite;
            }

            .glitch::after {
                color: magenta;
                animation: glitchBottom 1s infinite;
            }

        @keyframes glitchTop {
            0% {
                transform: translate(0);
            }

            50% {
                transform: translate(-2px, -2px);
            }

            100% {
                transform: translate(0);
            }
        }

        @keyframes glitchBottom {
            0% {
                transform: translate(0);
            }

            50% {
                transform: translate(2px, 2px);
            }

            100% {
                transform: translate(0);
            }
        }

        /* LINK BUTTON */
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 10px;
            color: cyan;
            text-decoration: none;
            border: 1px solid cyan;
            box-shadow: 0 0 10px cyan;
            transition: 0.3s;
        }

            a:hover {
                box-shadow: 0 0 30px cyan, 0 0 60px magenta;
                transform: scale(1.1);
            }

        /* PARTICLES */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: cyan;
            opacity: 0.7;
            animation: rise linear infinite;
        }

        @keyframes rise {
            from {
                transform: translateY(0);
                opacity: 1;
            }

            to {
                transform: translateY(-200px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="grid"></div>
    <div class="scanlines"></div>

    <div class="container" id="card">
        <div class="emoji">😎</div>
        <h1 class="glitch" data-text="">
            <span id="typeText"></span>
        </h1>
        <a href="https://guns.lol/zilofr" target="_blank">Visit the original site</a>
    </div>

    <script>
        /* TYPEWRITER */
        const text = "This website was just for this emoji";
        let i = 0;
        let del = false;

        function type() {
            let el = document.getElementById("typeText");

            if (!del) {
                el.textContent = text.substring(0, i++);
                if (i > text.length) {
                    del = true;
                    setTimeout(type, 1200);
                    return;
                }
            } else {
                el.textContent = text.substring(0, i--);
                if (i < 0) del = false;
            }

            document.querySelector(".glitch").setAttribute("data-text", el.textContent);
            setTimeout(type, del ? 40 : 80);
        }
        type();

        /* 3D TILT */
        document.addEventListener("mousemove", e => {
            const card = document.getElementById("card");
            let x = (window.innerWidth / 2 - e.clientX) / 25;
            let y = (window.innerHeight / 2 - e.clientY) / 25;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        /* PARTICLES */
        for (let i = 0; i < 50; i++) {
            let p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "%";
            p.style.top = Math.random() * 100 + "%";
            p.style.animationDuration = (2 + Math.random() * 3) + "s";
            document.body.appendChild(p);
        }
    </script>

</body>
</html>
