<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRChat UI Controls</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    background: #05060a;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
    color: white;
}

/* GRID */
.grid {
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
    background-size: 50px 50px;
    transform: perspective(500px) rotateX(60deg);
    animation: moveGrid var(--grid-speed, 10s) linear infinite;
}

@keyframes moveGrid {
    from { transform: perspective(500px) rotateX(60deg) translateY(0); }
    to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

/* SCANLINES */
.scanlines {
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
}

/* PANEL */
.panel {
    position: absolute;
    width: 320px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(0,255,255,0.3);
    box-shadow: 0 0 25px rgba(0,255,255,0.2);
    cursor: grab;
}

.panel-header {
    font-weight: bold;
    margin-bottom: 10px;
    color: cyan;
    cursor: grab;
}

/* EMOJI */
.emoji {
    font-size: var(--emoji-size, 4rem);
    text-align: center;
}

/* TEXT */
h1 {
    font-size: 1rem;
    margin-top: 10px;
    text-shadow: 0 0 var(--glow, 10px) cyan;
}

/* BUTTON */
a {
    display: block;
    margin-top: 10px;
    padding: 10px;
    text-align: center;
    border-radius: 10px;
    color: cyan;
    text-decoration: none;
    border: 1px solid cyan;
    box-shadow: 0 0 10px cyan;
}

a:hover {
    box-shadow: 0 0 30px cyan, 0 0 60px magenta;
}

/* CONTROLS */
.control {
    margin: 10px 0;
}

label {
    font-size: 0.75rem;
    display: block;
    margin-bottom: 5px;
}

/* SLIDERS */
input[type="range"] {
    width: 100%;
    accent-color: cyan;
}

/* TOGGLES */
.toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 8px 0;
}

.switch {
    position: relative;
    width: 40px;
    height: 20px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    cursor: pointer;
    background: #333;
    border-radius: 20px;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    transition: 0.3s;
}

.slider::before {
    content: "";
    position: absolute;
    height: 14px;
    width: 14px;
    left: 3px;
    bottom: 3px;
    background: cyan;
    border-radius: 50%;
    transition: 0.3s;
}

input:checked + .slider {
    background: rgba(0,255,255,0.3);
}

input:checked + .slider::before {
    transform: translateX(20px);
}
</style>
</head>

<body>

<div class="grid" id="grid"></div>
<div class="scanlines" id="scanlines"></div>

<!-- MAIN PANEL -->
<div class="panel" id="panel1" style="top:100px; left:100px;">
    <div class="panel-header">Main UI</div>

    <div class="emoji">😎</div>
    <h1 id="text">This website was just for this emoji</h1>

    <a href="https://guns.lol/zilofr" target="_blank">Visit Site</a>
</div>

<!-- SETTINGS PANEL -->
<div class="panel" id="panel2" style="top:120px; left:500px;">
    <div class="panel-header">Settings</div>

    <!-- Emoji size -->
    <div class="control">
        <label>Emoji Size</label>
        <input type="range" min="2" max="8" value="4" id="emojiSize">
    </div>

    <!-- Glow -->
    <div class="control">
        <label>Glow Strength</label>
        <input type="range" min="0" max="30" value="10" id="glow">
    </div>

    <!-- Grid speed -->
    <div class="control">
        <label>Grid Speed</label>
        <input type="range" min="2" max="20" value="10" id="gridSpeed">
    </div>

    <!-- Toggles -->
    <div class="toggle">
        <span>Grid</span>
        <label class="switch">
            <input type="checkbox" id="gridToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="toggle">
        <span>Scanlines</span>
        <label class="switch">
            <input type="checkbox" id="scanToggle" checked>
            <span class="slider"></span>
        </label>
    </div>
</div>

<script>
/* DRAG */
document.querySelectorAll(".panel").forEach(panel => {
    let dragging = false, offsetX, offsetY;

    panel.querySelector(".panel-header").addEventListener("mousedown", e => {
        dragging = true;
        offsetX = e.clientX - panel.offsetLeft;
        offsetY = e.clientY - panel.offsetTop;
    });

    document.addEventListener("mousemove", e => {
        if (!dragging) return;
        panel.style.left = (e.clientX - offsetX) + "px";
        panel.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", () => dragging = false);
});

/* SLIDERS */
const emoji = document.querySelector(".emoji");

document.getElementById("emojiSize").oninput = e => {
    document.documentElement.style.setProperty("--emoji-size", e.target.value + "rem");
};

document.getElementById("glow").oninput = e => {
    document.documentElement.style.setProperty("--glow", e.target.value + "px");
};

document.getElementById("gridSpeed").oninput = e => {
    document.documentElement.style.setProperty("--grid-speed", e.target.value + "s");
};

/* TOGGLES */
document.getElementById("gridToggle").onchange = e => {
    document.getElementById("grid").style.display = e.target.checked ? "block" : "none";
};

document.getElementById("scanToggle").onchange = e => {
    document.getElementById("scanlines").style.display = e.target.checked ? "block" : "none";
};
</script>

</body>
</html>
