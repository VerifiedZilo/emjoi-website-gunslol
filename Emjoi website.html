<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji VR UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --emoji-size: 4rem;
    --glow: 10px;
    --grid-speed: 10s;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    background: #05060a;
    font-family: 'Orbitron', sans-serif;
    color: white;
}

/* GRID BACKGROUND */
.grid {
    position: absolute;
    width: 200%;
    height: 200%;
    background-image:
        linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
    background-size: 50px 50px;
    transform: perspective(500px) rotateX(60deg);
    animation: moveGrid var(--grid-speed) linear infinite;
}

@keyframes moveGrid {
    from { transform: perspective(500px) rotateX(60deg) translateY(0); }
    to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

/* PANEL STYLE */
.panel {
    position: absolute;
    width: 320px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(0,255,255,0.3);
    box-shadow: 0 0 25px rgba(0,255,255,0.2);
    cursor: grab;
}

/* HEADER (DRAG HANDLE) */
.panel-header {
    color: cyan;
    font-weight: bold;
    margin-bottom: 10px;
    cursor: grab;
}

/* EMOJI */
.emoji {
    font-size: var(--emoji-size);
    text-align: center;
}

/* TEXT */
h1 {
    font-size: 1rem;
    text-align: center;
    text-shadow: 0 0 var(--glow) cyan;
}

/* LINK BUTTON */
a {
    display: block;
    margin-top: 10px;
    padding: 10px;
    text-align: center;
    border-radius: 10px;
    color: cyan;
    text-decoration: none;
    border: 1px solid cyan;
    box-shadow: 0 0 10px cyan;
}

a:hover {
    box-shadow: 0 0 30px cyan;
    transform: scale(1.05);
}

/* CONTROLS */
.control {
    margin: 10px 0;
}

label {
    font-size: 0.75rem;
    display: block;
    margin-bottom: 5px;
}

input[type="range"] {
    width: 100%;
    accent-color: cyan;
}

/* TOGGLES */
.toggle {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
}

.switch {
    position: relative;
    width: 40px;
    height: 20px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    inset: 0;
    background: #222;
    border-radius: 20px;
    cursor: pointer;
}

.slider::before {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    background: cyan;
    border-radius: 50%;
    left: 3px;
    top: 3px;
    transition: 0.3s;
}

input:checked + .slider::before {
    transform: translateX(20px);
}
</style>
</head>

<body>

<div class="grid" id="grid"></div>

<!-- MAIN PANEL -->
<div class="panel" id="panel1" style="top:100px; left:100px;">
    <div class="panel-header">Main UI</div>

    <div class="emoji">😎</div>

    <h1 id="text">This website was just for this emoji</h1>

    <a href="https://guns.lol/zilofr" target="_blank">
        Visit Link
    </a>
</div>

<!-- SETTINGS PANEL -->
<div class="panel" id="panel2" style="top:120px; left:500px;">
    <div class="panel-header">Settings</div>

    <div class="control">
        <label>Emoji Size</label>
        <input type="range" min="2" max="8" value="4" id="emojiSize">
    </div>

    <div class="control">
        <label>Glow</label>
        <input type="range" min="0" max="30" value="10" id="glow">
    </div>

    <div class="control">
        <label>Grid Speed</label>
        <input type="range" min="2" max="20" value="10" id="gridSpeed">
    </div>

    <div class="toggle">
        <span>Grid</span>
        <label class="switch">
            <input type="checkbox" id="gridToggle" checked>
            <span class="slider"></span>
        </label>
    </div>
</div>

<script>
/* DRAG SYSTEM */
document.querySelectorAll(".panel").forEach(panel => {
    let dragging = false;
    let offsetX, offsetY;

    panel.querySelector(".panel-header").addEventListener("mousedown", e => {
        dragging = true;
        offsetX = e.clientX - panel.offsetLeft;
        offsetY = e.clientY - panel.offsetTop;
    });

    document.addEventListener("mousemove", e => {
        if (!dragging) return;
        panel.style.left = (e.clientX - offsetX) + "px";
        panel.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", () => dragging = false);
});

/* SLIDERS */
emojiSize.oninput = e =>
    document.documentElement.style.setProperty("--emoji-size", e.target.value + "rem");

glow.oninput = e =>
    document.documentElement.style.setProperty("--glow", e.target.value + "px");

gridSpeed.oninput = e =>
    document.documentElement.style.setProperty("--grid-speed", e.target.value + "s");

/* TOGGLE */
gridToggle.onchange = e =>
    document.getElementById("grid").style.display = e.target.checked ? "block" : "none";
</script>

</body>
</html>
